<!doctype html>
<html>
  <head>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
  </head>
  <body>
    <h1 id="task-update"></h1>
    <script>
      const socket = io("http://localhost:8000");
      const updater = document.getElementById("task-update");

      async function startTask() {
        try {
          const response = await axios.get(
            "http://localhost:8000/api/v1/endpoints/ingestion",
          );

          const taskId = response.data.task;
          console.log("task_id:", taskId);
          // Join the correct room

          socket.emit("join_room", { task_id: taskId });
        } catch (err) {
          console.error(err);
        }
      }

      socket.on("connect", () => {
        console.log("connected:", socket.id);
        startTask();
      });

      socket.on("task_update", (data) => {
        updater.textContent = `${data}`;
        console.log("update:", data);
      });
    </script>
  </body>
</html>
