services:
  nginx:
    image: nginx:latest
    container_name: minio-proxy
    ports:
      - "9000:9000"
    depends_on:
      - minio
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    networks:
      app-network:
        aliases:
          - miniogw

  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file:
      - .env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  minio:
    image: minio/minio:latest
    container_name: storage
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend/
      dockerfile: Dockerfile.dev
    container_name: frontend-dev
    ports:
      - "8003:3000"
    networks:
      - app-network

  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile.v1
    container_name: api-gateway
    ports:
      - "8000:5000"
    volumes:
      - ./services/api-gateway/src:/app/services/api-gateway/src
      # - /app/.venv
    depends_on:
      - rabbitmq
      # - redis
      - minio
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - app-network

  ingestion:
    build:
      context: .
      dockerfile: ./services/ingestion/Dockerfile
    container_name: ingestion
    ports:
      - "8001:5001"
    volumes:
      - ./services/ingestion/src:/app/services/ingestion/src
      # - /app/.venv
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      api-gateway:
        condition: service_started
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - app-network

  vision-engine:
    build:
      context: .
      dockerfile: ./services/vision-engine/Dockerfile
    container_name: vision-engine
    ports:
      - "8004:5004"
    extra_hosts:
      - "host.dockerfile.internal:host-gateway"
    volumes:
      - ./services/vision-engine/src:/app/services/vision-engine/src
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      api-gateway:
        condition: service_started
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - app-network

volumes:
  rabbitmq_data:
    driver: local
  minio_data:
    driver: local

networks:
  app-network:
    driver: bridge
